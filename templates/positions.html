<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Positions — FinSaathi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #5B4FE5;
      --brand-dark: #4338CA;
      --mint: #00B386;
      --mint-bg: #E6FBF5;
      --coral: #E2434F;
      --coral-bg: #FFEDEF;
      --gold: #FFD166;
      --gold-bg: #FFF6E0;
      --ember: #FF8A5B;
      --bg: #FAFAFC;
      --card: #ffffff;
      --border: #EFEFF5;
      --text: #1A1A2E;
      --muted: #8B8B9E;
    }
    h1,h2,h3,h4,.heading { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }
    nav { background: white; padding: 1rem 1.5rem; display: flex;
          justify-content: space-between; align-items: center;
          border-bottom: 1px solid var(--border); }
    nav h2 { color: var(--brand); font-size: 1.2rem; }
    nav div { display: flex; gap: 1rem; }
    nav a { color: #666; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: var(--brand); }
    .container { max-width: none; margin: 0; padding: 1.5rem; }
    h3 { font-size: 1.1rem; margin-bottom: 0.3rem; }
    .sub { font-size: 0.85rem; color: var(--muted); margin-bottom: 1rem; }
    .card { background: white; border-radius: 12px; padding: 1.2rem;
            border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 0.6rem 0.8rem; border-bottom: 2px solid var(--border);
         font-size: 0.8rem; color: var(--muted); }
    td { padding: 0.7rem 0.8rem; border-bottom: 1px solid #F6F6FA; }
    .green { color: var(--mint); font-weight: 600; } .red { color: var(--coral); font-weight: 600; }
    .empty { text-align: center; color: var(--muted); padding: 2rem; }
  </style>
</head>
<body>
  <nav>
    <h2>FinSaathi</h2>
    <div>
      <a href="/dashboard">Dashboard</a>
      <a href="/watchlist">Watchlist</a>
      <a href="/positions">Positions</a>
      <a href="/orders">Orders</a>
      <a href="/learn">Learn</a>
      <a href="/spin">🎰 Spin</a>
      <a href="/about">About</a>
      <a href="/logout">Logout</a>
    </div>
  </nav>
  <div class="page-layout">
  {% include '_sidebar.html' %}
  <div class="main-content">
  <div class="container">
    <h3>Positions</h3>
    <p class="sub">Today's trading activity — resets every day</p>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Stock</th><th>Net qty</th><th>LTP</th>
            <th>Realized P&L</th><th>Unrealized P&L</th><th>Total P&L</th>
          </tr>
        </thead>
        <tbody id="positions-body">
          <tr><td colspan="6" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  </div>
  </div>

  <script>
    async function loadPositions() {
      const res = await fetch('/api/positions');
      const positions = await res.json();
      const body = document.getElementById('positions-body');
      if (!positions.length) {
        body.innerHTML = '<tr><td colspan="6" class="empty">No trades today yet — make a trade to see it here</td></tr>';
        return;
      }
      body.innerHTML = positions.map(p => `
        <tr>
          <td><b>${p.symbol}</b></td>
          <td>${p.net_qty}</td>
          <td>₹${p.current_price.toLocaleString('en-IN')}</td>
          <td class="${p.realized_pnl >= 0 ? 'green' : 'red'}">₹${p.realized_pnl.toLocaleString('en-IN')}</td>
          <td class="${p.unrealized_pnl >= 0 ? 'green' : 'red'}">₹${p.unrealized_pnl.toLocaleString('en-IN')}</td>
          <td class="${p.total_pnl >= 0 ? 'green' : 'red'}">₹${p.total_pnl.toLocaleString('en-IN')}</td>
        </tr>
      `).join('');
    }
    loadPositions();
  </script>
  <script src="/static/sounds.js"></script>
</body>
</html>
