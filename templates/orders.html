<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders — FinSaathi</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --brand: #5B4FE5;
      --brand-dark: #4338CA;
      --mint: #00B386;
      --mint-bg: #E6FBF5;
      --coral: #E2434F;
      --coral-bg: #FFEDEF;
      --gold: #FFD166;
      --gold-bg: #FFF6E0;
      --ember: #FF8A5B;
      --bg: #FAFAFC;
      --card: #ffffff;
      --border: #EFEFF5;
      --text: #1A1A2E;
      --muted: #8B8B9E;
    }
    h1,h2,h3,h4,.heading { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); }
    nav { background: white; padding: 1rem 1.5rem; display: flex;
          justify-content: space-between; align-items: center;
          border-bottom: 1px solid var(--border); }
    nav h2 { color: var(--brand); font-size: 1.2rem; }
    nav div { display: flex; gap: 1rem; }
    nav a { color: #666; text-decoration: none; font-size: 0.9rem; }
    nav a:hover { color: var(--brand); }
    .container { max-width: none; margin: 0; padding: 1.5rem; }
    h3 { font-size: 1.1rem; margin-bottom: 1rem; }
    .card { background: white; border-radius: 12px; padding: 1.2rem;
            border: 1px solid var(--border); }
    table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    th { text-align: left; padding: 0.6rem 0.8rem;
         border-bottom: 2px solid var(--border);
         font-size: 0.8rem; color: var(--muted); }
    td { padding: 0.7rem 0.8rem; border-bottom: 1px solid #F6F6FA; }
    .buy { color: var(--mint); font-weight: 600; }
    .sell { color: var(--coral); font-weight: 600; }
    .empty { text-align: center; color: var(--muted); padding: 2rem; }
    .remove-btn { background: none; border: none; color: var(--coral); cursor: pointer; font-size: 0.85rem; }
  </style>
</head>
<body>
  <nav>
    <h2>FinSaathi</h2>
    <div>
      <a href="/dashboard">Dashboard</a>
      <a href="/watchlist">Watchlist</a>
      <a href="/positions">Positions</a>
      <a href="/orders">Orders</a>
      <a href="/learn">Learn</a>
      <a href="/about">About</a>
      <a href="/logout">Logout</a>
    </div>
  </nav>
  <div class="page-layout">
  {% include '_sidebar.html' %}
  <div class="main-content">
  <div class="container">
    <h3>All orders — {{ username.title() }}</h3>
    <div class="card">
      <table>
        <thead>
          <tr>
            <th>Time</th>
            <th>Stock</th>
            <th>Type</th>
            <th>Action</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Total</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="orders-body">
          <tr><td colspan="9" class="empty">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
  </div>
  </div>

  <script>
    function statusBadge(status) {
      const colors = {
        "Executed": "background:var(--mint-bg, #f0fdf4);color:#166534",
        "Placed": "background:var(--gold-bg, #fffbeb);color:#92400e",
        "Cancelled": "background:#f3f4f6;color:#6b7280",
        "Expired": "background:var(--coral-bg, #fef2f2);color:#991b1b"
      };
      const style = colors[status] || "background:#f3f4f6;color:#6b7280";
      return `<span style="${style};font-size:0.75rem;font-weight:600;padding:3px 10px;border-radius:12px;white-space:nowrap">${status}</span>`;
    }

    async function loadOrders() {
      const res = await fetch('/api/orders');
      const orders = await res.json();
      const tbody = document.getElementById('orders-body');
      if (!orders.length) {
        tbody.innerHTML = '<tr><td colspan="9" class="empty">No orders yet — go make your first trade!</td></tr>';
        return;
      }
      tbody.innerHTML = orders.map(o => {
        const date = new Date(o.time).toLocaleString('en-IN');
        const cancelBtn = o.status === 'Placed'
          ? `<button class="remove-btn" onclick="cancelOrder('${o.id || ''}')">Cancel</button>`
          : '';
        return `<tr>
          <td style="color:#888;font-size:0.85rem">${date}</td>
          <td><strong>${o.symbol}</strong></td>
          <td style="text-transform:capitalize">${o.order_type}</td>
          <td class="${o.action}">${o.action.toUpperCase()}</td>
          <td>${o.qty}</td>
          <td>₹${o.price.toLocaleString('en-IN')}</td>
          <td>₹${o.total.toLocaleString('en-IN')}</td>
          <td>${statusBadge(o.status)}</td>
          <td>${cancelBtn}</td>
        </tr>`;
      }).join('');
    }

    async function cancelOrder(id) {
      if (!id) return;
      await fetch('/api/cancel-order', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({id})
      });
      loadOrders();
    }

    loadOrders();
  </script>
  <script src="/static/sounds.js"></script>
</body>
</html>
